name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job name MUST be 'build' - main branch protection requires this status check.
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Upload mod jar
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: recompile-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 14

  # In-world GameTests - booted headless server runs each registered test in a
  # scripted plot, exits non-zero on any failure. Independent of build so the two
  # layers report separately.
  gameTest:
    name: gameTest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Run GameTest server
        run: ./gradlew runGameTestServer --stacktrace
