# Recompile texture manifest - consumed by the texgen engine in mc-pack-toolkit.
# Backend is procedural for now (deterministic, offline, ships real placeholder-
# quality art). Flip a surface to backend = "ai" and run `texgen generate` with an
# OPENAI_API_KEY to get gpt-image-1 candidates, then select + promote.

mod_id = "recompile"

[settings]
model = "gpt-image-1"
quality = "low"
# 5 = the org's gpt-image-1 per-minute image cap; one call per surface stays under
# the rate limit, then the backend throttles ~60s before the next surface.
candidate_count = 5

# ---------------------------------------------------------------------------
# Blocks
# ---------------------------------------------------------------------------

[surface.garbage_block]
kind = "block"
backend = "procedural"
size = 16
variants = 3
prompt = "a full-bleed top-down Minecraft block face of compacted household mixed trash: crushed cans, torn plastic, paper, and dirt clumps, muted browns and greys, gritty"
vanilla_ref = "block/coarse_dirt"
[surface.garbage_block.procedural]
style = "rubble"
palette = ["#6b5a3e", "#7a6b4a", "#8a7a5a", "#5a5148", "#4a4038", "#9a8a6a", "#847c6a"]

# ---------------------------------------------------------------------------
# Garbage block variants (P1.1)
# ---------------------------------------------------------------------------

# Multiface so a bag reads as a cuboidal block: taut wrinkled sides bulging over
# contents, a tied knot on top, settled folds on the bottom. Glossy black
# contractor bag. Rendered via cube_bottom_top (distinct top / bottom / side).
[surface.trash_bag]
kind = "block_multiface"
backend = "ai"
size = 16
faces = ["top", "bottom", "side"]
[surface.trash_bag.prompt]
top = "a full-bleed top-down Minecraft block face: the tied-off top of a glossy black plastic contractor trash bag, plastic gathered into a knot at the center with wrinkles radiating outward, dark with subtle sheen highlights"
bottom = "a full-bleed Minecraft block face: the settled bottom of a glossy black plastic trash bag, horizontal folds and creases, corners tucked under, dark, flatter and plainer"
side = "a full-bleed Minecraft block face: the side of a stuffed glossy black plastic contractor trash bag, taut plastic bulging over lumpy contents, vertical drape wrinkles and a slight sheen, dark"

# Multiface: sides show the wrapped strapping, top/bottom (end) show the cut
# cross-section. Rendered via cube_bottom_top (end on top+bottom, side on the 4 sides).
[surface.compacted_bale]
kind = "block_multiface"
backend = "ai"
size = 16
faces = ["end", "side"]
[surface.compacted_bale.prompt]
end = "a full-bleed top-down Minecraft block face: the cut end of a compacted cube bale of mixed household trash, a dense packed cross-section of crushed cans, plastic and paper, muted browns and greys, no strapping bands"
side = "a full-bleed Minecraft block face: the side of a compacted cube bale of mixed household trash bound with two horizontal wire strapping bands, dense crushed debris, muted browns and greys"

# Bulky Waste (P1.11): something big is buried here. The texture must read as
# CONTENTS UNKNOWN - it is a tell, and a tell that hints what is inside spoils its own
# reveal. No fridge, no mattress silhouette, nothing identifiable.
#
# It must ALSO be spottable from across a mound, which the first pass got wrong: muted
# browns and greys ARE what a garbage block looks like, so the tell vanished into its own
# surroundings. Hence the blue tarp - the most iconic object in any real dump, and the
# same trick the sorting table already uses ("welcome color against the muted palette").
# The colour IS the tell. Keep it saturated enough to carry at 16px against brown-grey.
[surface.bulky_waste]
kind = "block_multiface"
backend = "ai"
size = 16
faces = ["end", "side"]
[surface.bulky_waste.prompt]
end = "a full-bleed top-down Minecraft block face: a bulky unidentifiable object wrapped tightly in a weathered BLUE plastic tarpaulin, seen from directly above, frayed orange cord lashed across it, hard edges pushing up under the tarp, grime and dust in the folds. The blue must be clearly blue and stand out sharply against brown-grey garbage. Flat, no perspective, fills the whole tile. Nothing identifiable underneath - the shape stays a mystery"
side = "a full-bleed Minecraft block face: the side of a bulky object wrapped in a weathered BLUE plastic tarpaulin, taut over hard hidden edges, a frayed orange cord lashed horizontally across the middle, grimy folds and creases. Clearly blue, standing out sharply against brown-grey garbage. Flat, fills the whole tile, nothing identifiable underneath"

# Mattress (P1.11): the first find, and this world's bed - a vanilla bed needs planks and
# there are no trees. Flat 5px slab, rendered from a custom model, so it needs a top and
# a side. Filthy, but it is the nicest thing you own.
[surface.mattress]
kind = "block_multiface"
backend = "ai"
size = 16
faces = ["top", "side"]
[surface.mattress.prompt]
top = "a full-bleed top-down Minecraft block face: the top of a discarded mattress, pale blue-grey striped ticking fabric, buttoned tufts, brown water stains and a torn corner. Muted, flat, no perspective, fills the whole tile"
side = "a full-bleed Minecraft block face: the side edge of a discarded mattress, pale blue-grey striped ticking fabric with a piped seam running horizontally, stained and grubby, muted, fills the whole tile"

# ---------------------------------------------------------------------------
# Base material items (the 7-material vocabulary, P0.4)
# ---------------------------------------------------------------------------

# AI item icons on transparent backgrounds. Colour is the main 16px differentiator,
# so junk is pushed brown/mixed to stay distinct from steely scrap_metal.
[surface.scrap_metal]
kind = "item"
backend = "ai"
size = 16
prompt = "a small twisted lump of dull steely-grey scrap metal, bent nails and wire, simple bold Minecraft item icon silhouette, centered, plain transparent background, no scene"

[surface.plastic_scrap]
kind = "item"
backend = "ai"
size = 16
prompt = "a crushed wad of muted multicolored plastic scrap, faded red blue and white shreds, simple bold Minecraft item icon silhouette, centered, plain transparent background, no scene"

[surface.glass_shards]
kind = "item"
backend = "ai"
size = 16
prompt = "a small pile of pale teal-green broken glass shards, sharp translucent fragments, simple bold Minecraft item icon silhouette, centered, plain transparent background, no scene"

[surface.organic_muck]
kind = "item"
backend = "ai"
size = 16
prompt = "a wet glob of dark brown-green organic muck, compost sludge, simple bold Minecraft item icon silhouette, centered, plain transparent background, no scene"

[surface.fiber_scrap]
kind = "item"
backend = "ai"
size = 16
prompt = "a tangle of frayed tan cloth and fiber scrap with loose threads, simple bold Minecraft item icon silhouette, centered, plain transparent background, no scene"

[surface.e_scrap]
kind = "item"
backend = "ai"
size = 16
prompt = "a broken green circuit board fragment with gold contacts and tiny components, simple bold Minecraft item icon silhouette, centered, plain transparent background, no scene"

[surface.junk]
kind = "item"
backend = "ai"
size = 16
prompt = "a compacted lump of mixed brown-grey junk filler, crushed cardboard and grit, simple bold Minecraft item icon silhouette, centered, plain transparent background, no scene"

# ---------------------------------------------------------------------------
# Food (P1.9) - scavenged tin cans, sealed + opened
# ---------------------------------------------------------------------------

[surface.tin_can]
kind = "item"
backend = "ai"
size = 16
prompt = "a sealed dented tin food can standing upright with a faded torn paper label, muted greys and browns, simple bold Minecraft item icon silhouette, centered, plain transparent background, no scene"

# The opened state of tin_can. Derived from tin_can's raw source (reference) so the
# pair reads as one object in two states - generated independently, the body colour
# and label drift apart and they stop looking like the same can.
[surface.tin_can_open]
kind = "item"
backend = "ai"
size = 16
reference = "tin_can"
prompt = "keep this exact can unchanged - same grey steel body, same dents, same faded red-and-white label, same size and position. Change only the top: the lid is cut open and peeled halfway back as a jagged curled metal disc, revealing dull mystery contents inside the rim. Plain transparent background, no scene"

# ---------------------------------------------------------------------------
# Forage (P1.9) - the dump mushroom. The substrate is vanilla minecraft:mycelium,
# so there is no first-party substrate surface here.
#
# kind = "block" (not "item") because the sprite feeds a cross-model BLOCK: the
# blocks atlas only stitches textures/block/**, so an item-atlas sprite renders as
# the missing texture in-world. The item icon reuses this same block texture, which
# is exactly what vanilla does for brown_mushroom. `transparent` holds the alpha
# that kind = "block" would otherwise turn off.
# ---------------------------------------------------------------------------

[surface.dump_mushroom]
kind = "block"
transparent = true
backend = "ai"
size = 16
prompt = "a single small drab scavenged dump mushroom, a pale grey-brown fungal cap on a short stalk, simple bold Minecraft item icon silhouette, centered, plain transparent background, no scene"

# ---------------------------------------------------------------------------
# Scrap crafting table (bootstrap 3x3 station)
# ---------------------------------------------------------------------------

[surface.scrap_crafting_table]
kind = "block_multiface"
backend = "retint"
size = 16
faces = ["top", "front", "side", "bottom"]
# A scrap-metal retint of the vanilla crafting table: keep the recognizable grid/shape,
# recolor to cool grey. Sources are vanilla textures, extracted from the client jar.
tint = "#aab0b6"
[surface.scrap_crafting_table.source]
top = "block/crafting_table_top"
front = "block/crafting_table_front"
side = "block/crafting_table_side"
bottom = "block/oak_planks"

# ---------------------------------------------------------------------------
# Sorting Tarp (P1.3) - a jury-rigged sorting TABLE, rendered by a custom multi-
# element model (models/block/sorting_tarp.json): tarp-covered top spread with junk,
# tarp/sack sides, salvaged frame legs. Screens were dropped (design revision).
# ---------------------------------------------------------------------------

[surface.sorting_tarp]
kind = "block_multiface"
backend = "ai"
size = 16
faces = ["top", "side", "leg"]
[surface.sorting_tarp.prompt]
top = "a full-bleed top-down Minecraft block face: a worn canvas tarp work surface spread with a small pile of mixed sorted trash, muted browns and greys, gritty"
side = "a full-bleed Minecraft block face: the side of a jury-rigged sorting table, a worn tarp draping over the edge with a striped woven-plastic bulk sack slumped against it, muted browns with a faded band of blue and red stripe"
leg = "a full-bleed Minecraft block face: a salvaged scrap-metal and weathered-wood table leg, rusty and worn, muted, vertical grain"

# Scrap Barrel: the storage block, a welded box of salvaged sheet metal. Rendered via
# cube_bottom_top, so it needs an end face and a side. Top and bottom share the "end"
# texture the way the bale does - the box's two ends look alike, and the barrel is
# always top-up, so its underside is barely ever seen. "end_open" is the third face:
# the lid state a vanilla barrel has, swapped in by the blockstate.
#
# CUBOIDAL, never a cylinder. This is a full block, so a round drum painted on a
# square face fights its own silhouette - a circular lid floating on a square top
# reads as a mistake, and cylindrical sides cannot tile against a neighbour. Vanilla's
# own barrel is a boxy barrel for exactly this reason. Every prompt below pushes
# straight edges, corner welds and flat panels, and rules out circles explicitly.
[surface.scrap_barrel]
kind = "block_multiface"
backend = "ai"
size = 16
faces = ["end", "end_open", "side"]
[surface.scrap_barrel.prompt]
end = "a full-bleed top-down Minecraft block face: the closed square lid of a boxy welded steel container seen from directly above, a riveted flange running straight along all four edges, a flat latch plate near one edge, scratched grey paint and rust streaks. Square and rectilinear - straight edges corner to corner, absolutely no circles, no round rim, no cylinder. Flat, no perspective, fills the whole tile"
end_open = "a full-bleed top-down Minecraft block face: a boxy welded steel container seen from directly above with its lid off, a dark square hollow opening framed by a rusty riveted flange running straight along all four edges, muted greys and browns. The opening is a SQUARE - rectilinear, straight edges, absolutely no circles, no round rim, no cylinder. Flat, no perspective, fills the whole tile"
side = "a full-bleed Minecraft block face: the flat side panel of a boxy welded steel container, a horizontal riveted rib across the middle, vertical weld seams down the left and right edges, scratched grey paint, rust streaks and dents. Flat sheet metal, rectilinear - no curvature, no barrel staves, no cylinder. Muted, fills the whole tile edge to edge"

# ---------------------------------------------------------------------------
# Crafting component + trash-tier tools (P1.2)
# ---------------------------------------------------------------------------

# Rebar keeps the vanilla stick silhouette (a diagonal rod) but retinted to rusty
# steel - a recognizable "bent rod" shape, retextured, not AI-generated.
[surface.rebar]
kind = "item"
backend = "retint"
size = 16
tint = "#a9713f"
source = "item/stick"

# No vanilla knife to retint, so AI item icon on a transparent background.
[surface.scrap_knife]
kind = "item"
backend = "ai"
size = 16
prompt = "a crude knife held diagonally, a jagged scrap-metal blade and a wrapped rusty-rebar handle, simple bold Minecraft item icon silhouette, centered, plain transparent background, no scene"

# No vanilla crowbar to retint, so AI item icon on a transparent background.
[surface.prybar]
kind = "item"
backend = "ai"
size = 16
prompt = "a bent steel crowbar prybar held diagonally, one hooked flattened pry end, rusty red-brown steel, simple bold Minecraft item icon silhouette, centered, plain transparent background, no scene"

# Junk shovel keeps the vanilla shovel silhouette but retinted to dull scrap grey -
# same recognizable tool shape, retextured, not AI-generated.
[surface.junk_shovel]
kind = "item"
backend = "retint"
size = 16
tint = "#9095a0"
source = "item/iron_shovel"

# ---------------------------------------------------------------------------
# Building blocks (P1.12): the deliberate shelter tier
# ---------------------------------------------------------------------------
# One texture per material; the slab/stairs/wall forms all reuse the base sprite.
# These must read as DELIBERATELY MADE (tidy, uniform) so they are distinct from
# the loose garbage pile they are refined from.

[surface.pressed_junk]
kind = "block"
backend = "ai"
size = 16
prompt = "a full-bleed top-down Minecraft block face of a compacted brick of mixed trash pressed flat and uniform: crushed cans, plastic and paper fused into a dense tidy block with faint horizontal compaction bands, muted browns and greys, deliberately made not a loose pile"

[surface.scrap_plating]
kind = "block"
backend = "ai"
size = 16
prompt = "a full-bleed Minecraft block face of a riveted salvaged sheet-metal plate, overlapping steel panels with bolt rivets down the seams, weathered grey steel with scratches and light rust, flat industrial plating"

[surface.corrugated_metal]
kind = "block"
backend = "ai"
size = 16
prompt = "a full-bleed Minecraft block face of corrugated galvanized metal roofing, regular vertical wavy ridges evenly spaced, weathered zinc-grey with rust streaks and dents, iconic shanty roofing"

[surface.plastic_panel]
kind = "block"
backend = "ai"
size = 16
prompt = "a full-bleed Minecraft block face of a salvaged plastic sheeting panel, flat off-white and pale grey plastic with grime and faint mould, subtle seams and scuffs, matte synthetic"

# Recycled cullet glass is a retint of vanilla glass, not AI: a framed semi-transparent
# glass tile is exactly what vanilla glass already is, and gpt-image-1 returns near-blank
# output for it (a transparent-background prompt isolates an object, not a framed tile).
# Retint keeps vanilla's alpha (the see-through centre) and just shifts it murky green-grey.
[surface.cullet_glass]
kind = "block"
transparent = true
backend = "retint"
size = 16
tint = "#6e7a5a"
source = "block/glass"

[surface.cullet_glass_pane_top]
kind = "block"
transparent = true
backend = "retint"
size = 16
tint = "#6e7a5a"
source = "block/glass_pane_top"
