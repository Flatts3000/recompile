# Recompile texture manifest - consumed by the texgen engine in mc-pack-toolkit.
# Backend is procedural for now (deterministic, offline, ships real placeholder-
# quality art). Flip a surface to backend = "ai" and run `texgen generate` with an
# OPENAI_API_KEY to get gpt-image-1 candidates, then select + promote.

mod_id = "recompile"

[settings]
model = "gpt-image-1"
quality = "low"
candidate_count = 6

# ---------------------------------------------------------------------------
# Blocks
# ---------------------------------------------------------------------------

[surface.garbage_block]
kind = "block"
backend = "procedural"
size = 16
variants = 3
prompt = "a full-bleed top-down Minecraft block face of compacted household mixed trash: crushed cans, torn plastic, paper, and dirt clumps, muted browns and greys, gritty"
vanilla_ref = "block/coarse_dirt"
[surface.garbage_block.procedural]
style = "rubble"
palette = ["#6b5a3e", "#7a6b4a", "#8a7a5a", "#5a5148", "#4a4038", "#9a8a6a", "#847c6a"]

